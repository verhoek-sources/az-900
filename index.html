<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AZ-900 Quiz — Azure Fundamentals</title>
  <style>
    :root {
      --blue: #0078D4;
      --blue-dark: #005a9e;
      --green: #107C10;
      --red: #D13438;
      --amber: #F59D00;
      --bg: #F3F4F6;
      --card: #FFFFFF;
      --text: #1B1B1B;
      --muted: #6B7280;
      --border: #E5E7EB;
      --cc: #0078D4;
      --arch: #107C10;
      --gov: #8764B8;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .hidden { display: none !important; }

    /* ── Layout ──────────────────────────────── */
    .screen { min-height: 100vh; }
    .container { max-width: 680px; margin: 0 auto; padding: 24px 16px 48px; }

    /* ── App Header ──────────────────────────── */
    .app-header { text-align: center; padding: 48px 0 32px; }
    .azure-icon { font-size: 52px; display: block; margin-bottom: 12px; }
    .app-header h1 { font-size: 2rem; font-weight: 700; color: var(--blue); }
    .app-header .tagline { color: var(--muted); margin-top: 6px; font-size: 1rem; }

    /* ── Mobile responsive ───────────────────── */
    @media (max-width: 480px) {
      .app-header { padding: 24px 0 18px; }
      .azure-icon { font-size: 38px; margin-bottom: 8px; }
      .app-header h1 { font-size: 1.5rem; }
      .app-header .tagline { font-size: 0.9rem; }
      /* Quiz meta: badge gets its own full-width row on mobile */
      .quiz-meta { flex-wrap: wrap; gap: 6px; }
      .topic-badge { width: 100%; text-align: center; border-radius: 8px; padding: 6px 14px; font-size: 0.8rem; }
    }

    /* ── Cards ───────────────────────────────── */
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: var(--text); }

    /* ── Stat row (home) ─────────────────────── */
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .stat-label { color: var(--muted); font-size: 0.95rem; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--blue); }

    /* ── Buttons ─────────────────────────────── */
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: 2px solid transparent;
      margin-top: 10px;
      line-height: 1.4;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
    .btn-primary:hover { background: var(--blue-dark); border-color: var(--blue-dark); }
    .btn-secondary { background: transparent; color: var(--blue); border-color: var(--blue); }
    .btn-secondary:hover { background: #EBF4FF; }
    .btn:focus-visible,
    .option-btn:focus-visible {
      outline: 3px solid var(--blue);
      outline-offset: 2px;
    }

    /* ── History list ────────────────────────── */
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .history-item:last-child { border-bottom: none; }
    .history-date { color: var(--muted); font-size: 0.85rem; }
    .history-score { font-weight: 700; color: var(--blue); font-size: 0.95rem; }

    /* ── Progress bar ────────────────────────── */
    .progress-bar-wrap { height: 5px; background: var(--border); position: sticky; top: 0; z-index: 10; }
    .progress-bar-fill { height: 100%; background: var(--blue); width: 0%; transition: width 0.3s ease; }

    /* ── Quiz meta bar ───────────────────────── */
    .quiz-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .topic-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #fff;
    }
    .badge-cc   { background: var(--cc); }
    .badge-arch { background: var(--arch); }
    .badge-gov  { background: var(--gov); }
    .progress-text { color: var(--muted); font-size: 0.875rem; }

    /* ── Question ────────────────────────────── */
    .question-text {
      font-size: 1.1rem;
      line-height: 1.65;
      font-weight: 500;
      margin-bottom: 24px;
    }

    /* ── Option buttons ──────────────────────── */
    .option-btn {
      display: block;
      width: 100%;
      padding: 13px 16px;
      margin-bottom: 10px;
      background: #fff;
      border: 2px solid var(--border);
      border-radius: 8px;
      text-align: left;
      font-size: 0.95rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      font-family: inherit;
      line-height: 1.4;
    }
    .option-btn:hover:not(:disabled) { border-color: var(--blue); background: #EBF4FF; }
    .option-btn:disabled { cursor: default; }
    .option-btn.correct { border-color: var(--green); background: #F0FFF0; color: var(--green); font-weight: 600; }
    .option-btn.wrong   { border-color: var(--red);   background: #FFF0F0; color: var(--red); font-weight: 600; }

    /* ── Explanation ─────────────────────────── */
    .explanation {
      margin-top: 16px;
      padding: 14px 16px;
      background: #F8F9FA;
      border-left: 4px solid var(--blue);
      border-radius: 0 8px 8px 0;
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--muted);
    }
    .explanation .verdict {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }
    .verdict.correct-v { color: var(--green); }
    .verdict.wrong-v   { color: var(--red); }
    .learn-link {
      display: inline-block;
      margin-top: 10px;
      color: var(--blue);
      font-size: 0.85rem;
      text-decoration: none;
      font-weight: 600;
    }
    .learn-link:hover { text-decoration: underline; }

    /* ── Results ─────────────────────────────── */
    .score-display { text-align: center; padding: 8px 0 20px; }
    .score-number  { font-size: 2.75rem; font-weight: 700; color: var(--blue); line-height: 1; }
    .score-detail  { color: var(--muted); margin-top: 6px; font-size: 1rem; }
    .pass-banner {
      text-align: center;
      padding: 11px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
    }
    .pass-banner.pass { background: #ECFDF5; color: var(--green); }
    .pass-banner.fail { background: #FFFBEB; color: var(--amber); }

    /* ── Type breakdown (learning vs exam) ──── */
    .type-scores { margin-top: 16px; display: flex; gap: 12px; }
    .type-score-card {
      flex: 1;
      background: var(--bg);
      border-radius: 8px;
      padding: 12px 14px;
      text-align: center;
    }
    .type-score-label { font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
    .type-score-val   { font-size: 1.3rem; font-weight: 700; color: var(--text); }
    .type-score-pct   { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }

    /* ── Live score strip (quiz screen) ─────────── */
    .live-scores { display: flex; gap: 10px; margin-bottom: 14px; }
    .live-score-chip {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      text-align: center;
    }
    .ls-label { font-size: 0.7rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }
    .ls-val   { font-size: 1rem; font-weight: 700; color: var(--text); }
    .ls-pct   { font-size: 0.75rem; color: var(--muted); }

    /* ── Restart button ─────────────────────────── */
    .btn-restart {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }
    .btn-restart:hover { border-color: var(--red); color: var(--red); }

    /* ── Domain breakdown bars ───────────────── */
    .domain-row { margin-bottom: 22px; }
    .domain-row:last-child { margin-bottom: 0; }
    .domain-row-header { display: flex; justify-content: space-between; margin-bottom: 7px; font-size: 0.875rem; }
    .domain-name  { font-weight: 600; }
    .domain-score { color: var(--muted); }
    .bar-track { height: 10px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 99px; transition: width 0.6s ease; }
    .domain-weight { font-size: 0.75rem; color: var(--muted); margin-top: 5px; }
    /* ── Module panel ───────────────────────────────── */
    .btn-module-toggle {
      display: block;
      width: 100%;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-align: left;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      margin-bottom: 10px;
    }
    .btn-module-toggle:hover { background: #EBF4FF; border-color: var(--blue); }
    .module-panel {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .module-domain-header {
      font-size: 0.8rem;
      font-weight: 700;
      padding: 5px 0 5px 10px;
      margin: 10px 0 4px;
      border-left: 3px solid #ccc;
      color: var(--text);
    }
    .module-domain-header:first-child { margin-top: 0; }
    .module-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0 4px 14px;
      font-size: 0.8rem;
    }
    .module-name { flex: 1; color: var(--text); }
    .module-learn-link {
      color: var(--blue);
      text-decoration: none;
      font-size: 0.7rem;
      margin-left: 3px;
    }
    .module-learn-link:hover { text-decoration: underline; }
    .module-score { color: var(--muted); white-space: nowrap; min-width: 36px; text-align: right; }
    .module-bar-wrap { width: 60px; }
    .module-bar-track { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .module-bar-fill  { height: 6px; border-radius: 99px; transition: width 0.4s ease; }
    .module-pct { color: var(--muted); white-space: nowrap; min-width: 32px; text-align: right; }

    /* ── Focus bar ───────────────────────────────── */
    .focus-bar {
      background: #FFF8E6;
      border: 1px solid var(--amber);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.8rem;
      color: var(--text);
      margin-bottom: 10px;
    }
    .focus-bar.on-track {
      background: #ECFDF5;
      border-color: var(--green);
    }

    /* ── Module score colors ─────────────────────── */
    .module-row.score-green .module-bar-fill { background: var(--green) !important; }
    .module-row.score-amber .module-bar-fill { background: var(--amber) !important; }
    .module-row.score-red   .module-bar-fill { background: var(--red)   !important; }

    /* ── Study these card ────────────────────────── */
    .study-module-header {
      font-size: 0.8rem;
      font-weight: 700;
      margin: 12px 0 4px;
      color: var(--text);
    }
    .study-module-header:first-child { margin-top: 0; }
    .study-item {
      display: flex;
      align-items: baseline;
      gap: 4px;
      padding: 3px 0 3px 8px;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .study-item-text { flex: 1; }
    .study-item-link {
      color: var(--blue);
      text-decoration: none;
      font-size: 0.75rem;
      white-space: nowrap;
    }
    .study-item-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- ══ HOME SCREEN ══════════════════════════════════════════════ -->
  <div id="screen-home" class="screen">
    <div class="container">
      <div class="app-header">
        <span class="azure-icon">&#9729;&#65039;</span>
        <h1>AZ-900 Quiz</h1>
        <p class="tagline">Microsoft Azure Fundamentals</p>
      </div>

      <div class="card">
        <div class="stat-row">
          <span class="stat-label">Questions in bank</span>
          <span class="stat-value" id="total-count">—</span>
        </div>
        <button type="button" class="btn btn-primary" onclick="startQuiz()">Start Quiz</button>
      </div>

      <div class="card hidden" id="history-section">
        <h3>Recent Scores</h3>
        <div id="history-list"></div>
      </div>
    </div>
  </div>

  <!-- ══ QUIZ SCREEN ══════════════════════════════════════════════ -->
  <div id="screen-quiz" class="screen hidden">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar-fill"></div>
    </div>
    <div class="container">
      <div class="quiz-meta">
        <span class="topic-badge badge-cc" id="topic-badge">Topic</span>
        <span class="progress-text" id="progress-text">Question 1 / 60</span>
        <button type="button" class="btn-restart" onclick="confirmRestart()">&#8635; Restart</button>
      </div>

      <div class="live-scores hidden" id="live-scores">
        <div class="live-score-chip" id="live-score-learning">
          <div class="ls-label">Foundation</div>
          <div class="ls-val" id="ls-val-learning">0/0</div>
          <div class="ls-pct" id="ls-pct-learning">—</div>
        </div>
        <div class="live-score-chip" id="live-score-exam">
          <div class="ls-label">Exam-style</div>
          <div class="ls-val" id="ls-val-exam">0/0</div>
          <div class="ls-pct" id="ls-pct-exam">—</div>
        </div>
      </div>

      <div class="focus-bar hidden" id="focus-bar"></div>

      <div class="card">
        <p class="question-text" id="question-text"></p>
        <div id="options-list"></div>
        <div class="explanation hidden" id="explanation-box">
          <span class="verdict" id="verdict-text"></span>
          <span id="explanation-text"></span>
          <a id="learn-link" class="learn-link hidden" href="#" target="_blank" rel="noopener noreferrer">Learn more on Microsoft Learn ↗</a>
        </div>
      </div>

      <button type="button" class="btn btn-primary hidden" id="next-btn" onclick="nextQuestion()">Next Question</button>

      <button type="button" class="btn-module-toggle hidden" id="module-toggle" onclick="toggleModulePanel()">&#9658; Modules</button>
      <div class="module-panel hidden" id="module-panel"></div>
    </div>
  </div>

  <!-- ══ RESULTS SCREEN ═══════════════════════════════════════════ -->
  <div id="screen-results" class="screen hidden">
    <div class="container">
      <div class="app-header" style="padding-bottom:8px">
        <h1>Results</h1>
      </div>

      <div class="card">
        <div class="score-display">
          <div class="score-number" id="results-score-num"></div>
          <div class="score-detail" id="results-score-pct"></div>
        </div>
        <div class="pass-banner" id="pass-banner"></div>
        <div class="type-scores" id="type-scores"></div>
      </div>

      <div class="card">
        <h3>Score by Domain</h3>
        <div id="domain-breakdown"></div>
      </div>

      <div class="card">
        <h3>Score by Module</h3>
        <div id="module-breakdown"></div>
      </div>

      <div class="card hidden" id="study-these">
        <h3>&#128218; Study these</h3>
        <div id="study-these-content"></div>
      </div>

      <button type="button" class="btn btn-primary" onclick="startQuiz()">Try Again</button>
      <button type="button" class="btn btn-secondary" onclick="goHome()">Home</button>
    </div>
  </div>

  <script src="questions.js"></script>
  <script>
    // ── Constants ─────────────────────────────────────────────────
    const DOMAIN_BADGE = {
      'Cloud Concepts':                  'badge-cc',
      'Azure Architecture & Services':   'badge-arch',
      'Azure Management & Governance':   'badge-gov'
    };
    const DOMAIN_COLOR = {
      'Cloud Concepts':                  '#0078D4',
      'Azure Architecture & Services':   '#107C10',
      'Azure Management & Governance':   '#8764B8'
    };
    const DOMAIN_WEIGHT = {
      'Cloud Concepts':                  '25–30%',
      'Azure Architecture & Services':   '35–40%',
      'Azure Management & Governance':   '30–35%'
    };
    const HISTORY_KEY    = 'az900-quiz-history';
    const PASS_THRESHOLD = 0.70;

    const MODULE_URL = {
      'Cloud Computing':         'https://learn.microsoft.com/en-us/training/modules/describe-cloud-compute/',
      'Cloud Benefits':          'https://learn.microsoft.com/en-us/training/modules/describe-benefits-use-cloud-services/',
      'Service Types':           'https://learn.microsoft.com/en-us/training/modules/describe-cloud-service-types/',
      'Core Architecture':       'https://learn.microsoft.com/en-us/training/modules/describe-core-architectural-components-of-azure/',
      'Compute & Networking':    'https://learn.microsoft.com/en-us/training/modules/describe-azure-compute-networking-services/',
      'Storage':                 'https://learn.microsoft.com/en-us/training/modules/describe-azure-storage-services/',
      'Identity & Security':     'https://learn.microsoft.com/en-us/training/modules/describe-azure-identity-access-security/',
      'Cost Management':         'https://learn.microsoft.com/en-us/training/modules/describe-cost-management-azure/',
      'Governance & Compliance': 'https://learn.microsoft.com/en-us/training/modules/describe-features-tools-azure-for-governance-compliance/',
      'Resource Management':     'https://learn.microsoft.com/en-us/training/modules/describe-features-tools-manage-deploy-azure-resources/',
      'Monitoring':              'https://learn.microsoft.com/en-us/training/modules/describe-monitoring-tools-azure/'
    };

    const DOMAIN_MODULES = {
      'Cloud Concepts':                ['Cloud Computing', 'Cloud Benefits', 'Service Types'],
      'Azure Architecture & Services': ['Core Architecture', 'Compute & Networking', 'Storage', 'Identity & Security'],
      'Azure Management & Governance': ['Cost Management', 'Governance & Compliance', 'Resource Management', 'Monitoring']
    };
    const DOMAIN_ORDER = ['Cloud Concepts', 'Azure Architecture & Services', 'Azure Management & Governance'];

    // ── State ──────────────────────────────────────────────────────
    let shuffled    = [];
    let currentIdx  = 0;
    let userAnswers = [];  // [{ topic, type, module, correct }]
    let answered    = false;

    // ── Utilities ──────────────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function modId(mod) {
      return mod.replace(/[^a-z0-9]/gi, '-').toLowerCase();
    }

    function scoreClass(pct) {
      if (pct >= 70) return 'score-green';
      if (pct >= 50) return 'score-amber';
      return 'score-red';
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
      window.scrollTo(0, 0);
    }

    // ── localStorage helpers ───────────────────────────────────────
    function saveRun(correct, total) {
      if (total === 0) return;
      const history = loadHistory();
      history.unshift({
        date:    new Date().toLocaleDateString(),
        correct,
        total,
        percent: Math.round((correct / total) * 100)
      });
      try {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(0, 5)));
      } catch (_) { /* localStorage unavailable (e.g. file:// in some browsers) */ }
    }

    function loadHistory() {
      try {
        return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
      } catch (_) {
        return [];
      }
    }

    // ── Home Screen ────────────────────────────────────────────────
    function goHome() {
      initHome();
      showScreen('screen-home');
    }

    function initHome() {
      document.getElementById('total-count').textContent = QUESTIONS.length;

      const history     = loadHistory();
      const histSection = document.getElementById('history-section');
      const histList    = document.getElementById('history-list');

      if (history.length === 0) {
        histSection.classList.add('hidden');
        return;
      }

      histSection.classList.remove('hidden');
      histList.innerHTML = '';
      history.forEach(h => {
        const item  = document.createElement('div');
        item.className = 'history-item';
        const date  = document.createElement('span');
        date.className = 'history-date';
        date.textContent = h.date;
        const score = document.createElement('span');
        score.className = 'history-score';
        score.textContent = `${h.correct}/${h.total} \u2014 ${h.percent}%`;
        item.appendChild(date);
        item.appendChild(score);
        histList.appendChild(item);
      });
    }

    // Builds a .module-row element for a given module.
    // opts.withIds = true  → assigns mod-score/bar/pct IDs and sets initial 0 values (used by initModulePanel)
    // opts.withIds = false → uses provided correct/total values (used by renderModuleBreakdown)
    function buildModuleRow(mod, domain, opts) {
      const id = modId(mod);

      const row = document.createElement('div');
      row.className = 'module-row';

      const nameSpan = document.createElement('span');
      nameSpan.className = 'module-name';
      nameSpan.textContent = mod;
      if (MODULE_URL[mod]) {
        const link = document.createElement('a');
        link.href = MODULE_URL[mod];
        link.className = 'module-learn-link';
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.textContent = '\u2197';
        nameSpan.appendChild(link);
      }

      const scoreSpan = document.createElement('span');
      scoreSpan.className = 'module-score';

      const barWrap = document.createElement('div');
      barWrap.className = 'module-bar-wrap';
      const barTrack = document.createElement('div');
      barTrack.className = 'module-bar-track';
      const barFill = document.createElement('div');
      barFill.className = 'module-bar-fill';
      barFill.style.background = 'var(--border)';
      barTrack.appendChild(barFill);
      barWrap.appendChild(barTrack);

      const pctSpan = document.createElement('span');
      pctSpan.className = 'module-pct';

      if (opts.withIds) {
        scoreSpan.id     = `mod-score-${id}`;
        barFill.id       = `mod-bar-${id}`;
        pctSpan.id       = `mod-pct-${id}`;
        scoreSpan.textContent = '0/0';
        barFill.style.width   = '0%';
        pctSpan.textContent   = '0%';
      } else {
        const p = Math.round((opts.correct / opts.total) * 100);
        scoreSpan.textContent = `${opts.correct}/${opts.total}`;
        barFill.style.width   = `${p}%`;
        pctSpan.textContent   = `${p}%`;
      }

      row.appendChild(nameSpan);
      row.appendChild(scoreSpan);
      row.appendChild(barWrap);
      row.appendChild(pctSpan);
      return row;
    }

    function initModulePanel() {
      const panel = document.getElementById('module-panel');
      panel.innerHTML = '';
      DOMAIN_ORDER.forEach(domain => {
        const header = document.createElement('div');
        header.className = 'module-domain-header';
        header.textContent = domain;
        header.style.borderLeftColor = DOMAIN_COLOR[domain] || '#ccc';
        panel.appendChild(header);

        (DOMAIN_MODULES[domain] || []).forEach(mod => {
          panel.appendChild(buildModuleRow(mod, domain, { withIds: true }));
        });
      });
    }

    function toggleModulePanel() {
      const panel  = document.getElementById('module-panel');
      const toggle = document.getElementById('module-toggle');
      const isHidden = panel.classList.toggle('hidden');
      toggle.textContent = isHidden ? '\u25B6 Modules' : '\u25BC Modules';
    }

    // ── Quiz Screen ────────────────────────────────────────────────
    function startQuiz() {
      shuffled    = shuffle(QUESTIONS);
      currentIdx  = 0;
      userAnswers = [];
      answered    = false;
      document.getElementById('live-scores').classList.add('hidden');
      const focusBar = document.getElementById('focus-bar');
      focusBar.classList.add('hidden');
      focusBar.classList.remove('on-track');
      focusBar.textContent = '';
      document.getElementById('module-panel').classList.remove('hidden');
      document.getElementById('module-toggle').textContent = '\u25BC Modules';
      document.getElementById('module-toggle').classList.remove('hidden');
      initModulePanel();
      showScreen('screen-quiz');
      renderQuestion();
    }

    function renderQuestion() {
      const q     = shuffled[currentIdx];
      const total = shuffled.length;

      // Progress bar
      document.getElementById('progress-bar-fill').style.width =
        `${((currentIdx + 1) / total) * 100}%`;

      // Topic badge
      const badge = document.getElementById('topic-badge');
      badge.textContent = q.topic;
      badge.className   = 'topic-badge ' + (DOMAIN_BADGE[q.topic] || 'badge-cc');

      // Counter
      document.getElementById('progress-text').textContent =
        `Question ${currentIdx + 1} / ${total}`;

      // Question text
      document.getElementById('question-text').textContent = q.question;

      // Options
      document.getElementById('options-list').innerHTML = q.options
        .map((opt, i) => `<button type="button" class="option-btn" onclick="selectAnswer(${i})">${opt}</button>`)
        .join('');

      // Hide explanation + next button
      document.getElementById('explanation-box').classList.add('hidden');
      const nextBtn = document.getElementById('next-btn');
      nextBtn.classList.add('hidden');
      nextBtn.textContent = currentIdx === total - 1 ? 'See Results' : 'Next Question';

      answered = false;
    }

    function updateLiveScores() {
      const typeData = { learning: { correct: 0, total: 0 }, exam: { correct: 0, total: 0 } };
      userAnswers.forEach(({ type, correct: c }) => {
        const t = typeData[type] || typeData.learning;
        t.total++;
        if (c) t.correct++;
      });
      const strip = document.getElementById('live-scores');
      if (userAnswers.length === 0) { strip.classList.add('hidden'); return; }
      strip.classList.remove('hidden');
      [['learning', 'Foundation'], ['exam', 'Exam-style']].forEach(([key]) => {
        const d   = typeData[key];
        const chip = document.getElementById(`live-score-${key}`);
        if (d.total === 0) { chip.classList.add('hidden'); return; }
        chip.classList.remove('hidden');
        const p = Math.round((d.correct / d.total) * 100);
        document.getElementById(`ls-val-${key}`).textContent = `${d.correct}/${d.total}`;
        document.getElementById(`ls-pct-${key}`).textContent = `${p}%`;
      });

      // Update module rows (update even when panel is collapsed so it's current when opened)
      const moduleData = {};
      userAnswers.forEach(({ module: mod, correct: c }) => {
        if (!mod) return;
        if (!moduleData[mod]) moduleData[mod] = { correct: 0, total: 0 };
        moduleData[mod].total++;
        if (c) moduleData[mod].correct++;
      });
      Object.entries(moduleData).forEach(([mod, d]) => {
        const id = modId(mod);
        const p  = Math.round((d.correct / d.total) * 100);
        const scoreEl = document.getElementById(`mod-score-${id}`);
        const barEl   = document.getElementById(`mod-bar-${id}`);
        const pctEl   = document.getElementById(`mod-pct-${id}`);
        if (scoreEl) scoreEl.textContent = `${d.correct}/${d.total}`;
        if (barEl)   barEl.style.width   = `${p}%`;
        if (pctEl)   pctEl.textContent   = `${p}%`;
        if (scoreEl) {
          const rowEl = scoreEl.closest('.module-row');
          if (rowEl) {
            rowEl.classList.remove('score-green', 'score-amber', 'score-red');
            if (d.total >= 1) rowEl.classList.add(scoreClass(p));
          }
        }
      });
      updateFocusBar();
    }

    function updateFocusBar() {
      const bar = document.getElementById('focus-bar');
      if (!bar) return;

      if (userAnswers.length < 3) {
        bar.classList.add('hidden');
        return;
      }

      // Compute per-module scores
      const moduleData = {};
      userAnswers.forEach(({ module: mod, correct: c }) => {
        if (!mod) return;
        if (!moduleData[mod]) moduleData[mod] = { correct: 0, total: 0 };
        moduleData[mod].total++;
        if (c) moduleData[mod].correct++;
      });

      const scoredModules = Object.entries(moduleData)
        .filter(([, d]) => d.total >= 1)
        .map(([mod, d]) => ({ mod, pct: Math.round((d.correct / d.total) * 100) }));

      if (scoredModules.length === 0) {
        bar.classList.add('hidden');
        return;
      }

      bar.classList.remove('hidden');

      const allGreen = scoredModules.every(({ pct }) => pct >= 70);
      if (allGreen) {
        bar.classList.add('on-track');
        bar.textContent = '\u2713 On track \u2014 keep going!';
      } else {
        bar.classList.remove('on-track');
        const weakest = scoredModules
          .filter(({ pct }) => pct < 70)
          .sort((a, b) => a.pct - b.pct)
          .slice(0, 3)
          .map(({ mod }) => mod);
        bar.textContent = '\u26A0 Focus on: ' + weakest.join(' \u00B7 ');
      }
    }

    function confirmRestart() {
      if (userAnswers.length > 0 && !confirm('Restart the quiz? Current progress will be lost.')) return;
      startQuiz();
    }

    function selectAnswer(selectedIdx) {
      if (answered) return;
      answered = true;

      const q       = shuffled[currentIdx];
      const correct = selectedIdx === q.answer;

      userAnswers.push({ topic: q.topic, type: q.type || 'learning', module: q.module || '', correct });
      updateLiveScores();

      // Style the buttons
      document.querySelectorAll('.option-btn').forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.answer)         btn.classList.add('correct');
        else if (i === selectedIdx) btn.classList.add('wrong');
      });

      // Show explanation
      const box     = document.getElementById('explanation-box');
      const verdict = document.getElementById('verdict-text');
      verdict.textContent = correct ? '✓ Correct!' : '✗ Incorrect';
      verdict.className   = 'verdict ' + (correct ? 'correct-v' : 'wrong-v');
      document.getElementById('explanation-text').textContent = q.explanation;
      const link = document.getElementById('learn-link');
      const studyUrl = q.pageUrl || q.learnUrl;
      if (studyUrl) {
        link.href = studyUrl;
        link.classList.remove('hidden');
      } else {
        link.classList.add('hidden');
      }
      box.classList.remove('hidden');

      // Show next button (label already set in renderQuestion)
      document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
      if (currentIdx < shuffled.length - 1) {
        currentIdx++;
        renderQuestion();
      } else {
        showResults();
      }
      window.scrollTo(0, 0);
    }

    function renderModuleBreakdown() {
      const moduleData = {};
      userAnswers.forEach(({ module: mod, correct: c }) => {
        if (!mod) return;
        if (!moduleData[mod]) moduleData[mod] = { correct: 0, total: 0 };
        moduleData[mod].total++;
        if (c) moduleData[mod].correct++;
      });

      const container = document.getElementById('module-breakdown');
      container.innerHTML = '';

      DOMAIN_ORDER.forEach(domain => {
        const modules = (DOMAIN_MODULES[domain] || []).filter(mod => (moduleData[mod] || {}).total > 0);
        if (modules.length === 0) return;

        const header = document.createElement('div');
        header.className = 'module-domain-header';
        header.textContent = domain;
        header.style.borderLeftColor = DOMAIN_COLOR[domain] || '#ccc';
        container.appendChild(header);

        modules.forEach(mod => {
          const d = moduleData[mod];
          const row = buildModuleRow(mod, domain, { withIds: false, correct: d.correct, total: d.total });
          const p = Math.round((d.correct / d.total) * 100);
          row.classList.add(scoreClass(p));
          container.appendChild(row);
        });
      });
    }

    function renderStudyThese() {
      const card    = document.getElementById('study-these');
      const content = document.getElementById('study-these-content');
      // Collect wrong answers — userAnswers[i] matches shuffled[i]
      const wrongItems = [];
      userAnswers.forEach((a, i) => {
        if (!a.correct) wrongItems.push(shuffled[i]);
      });
      if (wrongItems.length === 0) { card.classList.add('hidden'); return; }
      card.classList.remove('hidden');
      content.innerHTML = '';
      DOMAIN_ORDER.forEach(domain => {
        (DOMAIN_MODULES[domain] || []).forEach(mod => {
          const items = wrongItems.filter(item => item.module === mod);
          if (items.length === 0) return;
          const header = document.createElement('div');
          header.className = 'study-module-header';
          header.textContent = mod;
          content.appendChild(header);
          items.forEach(q => {
            const studyUrl = q.pageUrl || q.learnUrl;
            const row = document.createElement('div');
            row.className = 'study-item';
            const text = document.createElement('span');
            text.className = 'study-item-text';
            const truncated = q.question.length > 80 ? q.question.slice(0, 80) + '\u2026' : q.question;
            text.textContent = '\u00B7 ' + truncated;
            row.appendChild(text);
            if (studyUrl) {
              const link = document.createElement('a');
              link.href = studyUrl;
              link.target = '_blank';
              link.rel = 'noopener noreferrer';
              link.className = 'study-item-link'; link.textContent = '\u2197';
              row.appendChild(link);
            }
            content.appendChild(row);
          });
        });
      });
    }

    // ── Results Screen ─────────────────────────────────────────────
    function showResults() {
      const total   = userAnswers.length;
      const correct = userAnswers.filter(a => a.correct).length;
      const pct     = total > 0 ? correct / total : 0;

      saveRun(correct, total);

      // Score
      document.getElementById('results-score-num').textContent =
        `${correct} / ${total}`;
      document.getElementById('results-score-pct').textContent =
        `${Math.round(pct * 100)}%`;

      // Banner
      const banner = document.getElementById('pass-banner');
      if (pct >= PASS_THRESHOLD) {
        banner.textContent = '✓ PASS — Great work!';
        banner.className   = 'pass-banner pass';
      } else {
        const needed = Math.round(PASS_THRESHOLD * 100);
        banner.textContent = `✗ Not yet — aim for ${needed}% to pass`;
        banner.className   = 'pass-banner fail';
      }

      // Learning vs Exam type breakdown
      const typeData = { learning: { correct: 0, total: 0 }, exam: { correct: 0, total: 0 } };
      userAnswers.forEach(({ type, correct: c }) => {
        const t = typeData[type] || typeData.learning;
        t.total++;
        if (c) t.correct++;
      });
      const typeScoresEl = document.getElementById('type-scores');
      typeScoresEl.innerHTML = '';
      [['learning', 'Foundation'], ['exam', 'Exam-style']].forEach(([key, label]) => {
        const d = typeData[key];
        if (d.total === 0) return;
        const p = Math.round((d.correct / d.total) * 100);
        const card = document.createElement('div');
        card.className = 'type-score-card';
        const lbl = document.createElement('div');
        lbl.className = 'type-score-label';
        lbl.textContent = label;
        const val = document.createElement('div');
        val.className = 'type-score-val';
        val.textContent = `${d.correct} / ${d.total}`;
        const pct = document.createElement('div');
        pct.className = 'type-score-pct';
        pct.textContent = `${p}%`;
        card.appendChild(lbl);
        card.appendChild(val);
        card.appendChild(pct);
        typeScoresEl.appendChild(card);
      });

      // Domain breakdown
      const domains = {};
      userAnswers.forEach(({ topic, correct: c }) => {
        if (!domains[topic]) domains[topic] = { correct: 0, total: 0 };
        domains[topic].total++;
        if (c) domains[topic].correct++;
      });

      document.getElementById('domain-breakdown').innerHTML =
        DOMAIN_ORDER.filter(t => domains[t]).map(topic => { const data = domains[topic];
          const p     = data.total > 0 ? Math.round((data.correct / data.total) * 100) : 0;
          const color = DOMAIN_COLOR[topic] || '#0078D4';
          return `
            <div class="domain-row">
              <div class="domain-row-header">
                <span class="domain-name">${topic}</span>
                <span class="domain-score">${data.correct}/${data.total} (${p}%)</span>
              </div>
              <div class="bar-track">
                <div class="bar-fill" style="width:${p}%;background:${color}"></div>
              </div>
              <div class="domain-weight">Exam weight: ${DOMAIN_WEIGHT[topic] || 'N/A'}</div>
            </div>
          `;
        }).join('');

      renderModuleBreakdown();
      renderStudyThese();

      showScreen('screen-results');
    }

    // ── Init ───────────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
      initHome();
      showScreen('screen-home');
    });
  </script>
</body>
</html>
